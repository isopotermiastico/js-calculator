<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>js-calculator</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="wrapper">
        <div class="calculator">
            <div class="container" id="inputDisplay">
                <div id= "calcScreenWrapper">
                    <div class="container" id="calcScreen">
                        <div class="entries">
                            <p class="entry" id="previous_operation"></p>
                            <p class="entry" id="internal_operation"></p>
                            <p class="entry" id="smallNumber"></p>
                            <p class="entry" id="bigNumber">0</p>
                        </div>
                    </div>
                </div>

            </div>
            <div class="container" id="calcButtons">
                <div class="grid" id="calcGrid">
                <!--js generated buttons for the grid --> 
                </div>

            </div>
            
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
