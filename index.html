<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>js-calculator</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="wrapper">
        <div class="calculator">
            <div class="container" id="inputDisplay">
                <div class="container" id="calcScreen"></div>

            </div>
            <div class="container" id="calcButtons">
                <div class="grid">
                    <button class="calc-button">%</button>
                    <button class="calc-button">CE</button>
                    <button class="calc-button">C</button>
                    <button class="calc-button">Del</button>

                    <button class="calc-button">1/x</button>
                    <button class="calc-button">x^2</button>
                    <button class="calc-button">sqr(x)</button>
                    <button class="calc-button">/</button>

                    <button class="calc-button">7</button>
                    <button class="calc-button">8</button>
                    <button class="calc-button">9</button>
                    <button class="calc-button">*</button>

                    <button class="calc-button">4</button>
                    <button class="calc-button">5</button>
                    <button class="calc-button">6</button>
                    <button class="calc-button">-</button>

                    <button class="calc-button">1</button>
                    <button class="calc-button">2</button>
                    <button class="calc-button">3</button>
                    <button class="calc-button">+</button>

                    <button class="calc-button">+/-</button>
                    <button class="calc-button">0</button>
                    <button class="calc-button">.</button>
                    <button class="calc-button" id="equalsButton">=</button>
                </div>

            </div>
            
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
